# ═══════════════════════════════════════════════════════════════
# MediMesh — Ambulance Service CI Pipeline
# ═══════════════════════════════════════════════════════════════
# Triggers only on changes to services/medimesh-ambulance/
# Calls the reusable pipeline template via workflow_call.
# ═══════════════════════════════════════════════════════════════

name: "CI — Ambulance Service"

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'services/medimesh-ambulance/**'
      - '.github/workflows/ci-ambulance.yml'
      - '.github/workflows/_reusable-service-pipeline.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/medimesh-ambulance/**'

concurrency:
  group: ci-ambulance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/_reusable-service-pipeline.yml
    with:
      service-path: services/medimesh-ambulance
      service-name: medimesh-ambulance
      image-name: medimesh_medimesh-ambulance
    secrets: inherit
