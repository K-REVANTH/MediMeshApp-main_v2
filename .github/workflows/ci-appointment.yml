# ═══════════════════════════════════════════════════════════════
# MediMesh — Appointment Service CI Pipeline
# ═══════════════════════════════════════════════════════════════
# Triggers only on changes to services/medimesh-appointment/
# Calls the reusable pipeline template via workflow_call.
# ═══════════════════════════════════════════════════════════════

name: "CI — Appointment Service"

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'services/medimesh-appointment/**'
      - '.github/workflows/ci-appointment.yml'
      - '.github/workflows/_reusable-service-pipeline.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/medimesh-appointment/**'

concurrency:
  group: ci-appointment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/_reusable-service-pipeline.yml
    with:
      service-path: services/medimesh-appointment
      service-name: medimesh-appointment
      image-name: medimesh_medimesh-appointment
    secrets: inherit
