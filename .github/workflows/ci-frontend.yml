# ═══════════════════════════════════════════════════════════════
# MediMesh — Frontend Service CI Pipeline
# ═══════════════════════════════════════════════════════════════
# Triggers only on changes to medimesh-frontend/
# Calls the reusable pipeline template via workflow_call.
# ═══════════════════════════════════════════════════════════════

name: "CI — Frontend Service"

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'medimesh-frontend/**'
      - '.github/workflows/ci-frontend.yml'
      - '.github/workflows/_reusable-service-pipeline.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'medimesh-frontend/**'

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/_reusable-service-pipeline.yml
    with:
      service-path: medimesh-frontend
      service-name: medimesh-frontend
      image-name: medimesh_medimesh-frontend
    secrets: inherit
