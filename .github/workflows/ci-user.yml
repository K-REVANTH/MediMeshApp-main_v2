# ═══════════════════════════════════════════════════════════════
# MediMesh — User Service CI Pipeline
# ═══════════════════════════════════════════════════════════════
# Triggers only on changes to services/medimesh-user/
# Calls the reusable pipeline template via workflow_call.
# ═══════════════════════════════════════════════════════════════

name: "CI — User Service"

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'services/medimesh-user/**'
      - '.github/workflows/ci-user.yml'
      - '.github/workflows/_reusable-service-pipeline.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/medimesh-user/**'

concurrency:
  group: ci-user-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/_reusable-service-pipeline.yml
    with:
      service-path: services/medimesh-user
      service-name: medimesh-user
      image-name: medimesh_medimesh-user
    secrets: inherit
