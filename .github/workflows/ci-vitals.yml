# ═══════════════════════════════════════════════════════════════
# MediMesh — Vitals Service CI Pipeline
# ═══════════════════════════════════════════════════════════════
# Triggers only on changes to services/medimesh-vitals/
# Calls the reusable pipeline template via workflow_call.
# ═══════════════════════════════════════════════════════════════

name: "CI — Vitals Service"

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'services/medimesh-vitals/**'
      - '.github/workflows/ci-vitals.yml'
      - '.github/workflows/_reusable-service-pipeline.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/medimesh-vitals/**'

concurrency:
  group: ci-vitals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/_reusable-service-pipeline.yml
    with:
      service-path: services/medimesh-vitals
      service-name: medimesh-vitals
      image-name: medimesh_medimesh-vitals
    secrets: inherit
