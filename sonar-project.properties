# ═══════════════════════════════════════════════════════════
# MediMesh — SonarQube Configuration
# ═══════════════════════════════════════════════════════════
# Setup: Configure SONAR_TOKEN and SONAR_HOST_URL in GitHub
#        repository secrets before enabling this stage.
# ═══════════════════════════════════════════════════════════

sonar.projectKey=medimesh
sonar.projectName=MediMesh Healthcare Platform
sonar.projectVersion=2.0.0

# Source directories (all microservices)
sonar.sources=services/medimesh-auth, \
              services/medimesh-user, \
              services/medimesh-doctor, \
              services/medimesh-appointment, \
              services/medimesh-vitals, \
              services/medimesh-pharmacy, \
              services/medimesh-ambulance, \
              services/medimesh-complaint, \
              services/medimesh-forum, \
              medimesh-bff, \
              medimesh-frontend/src

# Test directories
sonar.tests=services/medimesh-auth/tests, \
            services/medimesh-user/tests, \
            services/medimesh-doctor/tests, \
            services/medimesh-appointment/tests, \
            services/medimesh-vitals/tests, \
            services/medimesh-pharmacy/tests, \
            services/medimesh-ambulance/tests, \
            services/medimesh-complaint/tests, \
            services/medimesh-forum/tests, \
            medimesh-bff/tests, \
            medimesh-frontend/src

# Exclusions
sonar.exclusions=**/node_modules/**,\
                 **/coverage/**,\
                 **/build/**,\
                 **/dist/**,\
                 **/*.test.js,\
                 **/*.spec.js,\
                 **/helm/**,\
                 **/k8s/**,\
                 **/*.yaml,\
                 **/*.yml

# Test file patterns
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Coverage report paths (lcov format from Jest)
sonar.javascript.lcov.reportPaths=services/medimesh-auth/coverage/lcov.info, \
                                   services/medimesh-user/coverage/lcov.info, \
                                   services/medimesh-doctor/coverage/lcov.info, \
                                   services/medimesh-appointment/coverage/lcov.info, \
                                   services/medimesh-vitals/coverage/lcov.info, \
                                   services/medimesh-pharmacy/coverage/lcov.info, \
                                   services/medimesh-ambulance/coverage/lcov.info, \
                                   services/medimesh-complaint/coverage/lcov.info, \
                                   services/medimesh-forum/coverage/lcov.info, \
                                   medimesh-bff/coverage/lcov.info, \
                                   medimesh-frontend/coverage/lcov.info

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8
